<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus — The Platform for Modern Teams</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563EB;--blue-dark:#1D4ED8;--blue-light:#EFF6FF;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;--g300:#D1D5DB;
  --g400:#9CA3AF;--g500:#6B7280;--g600:#4B5563;--g800:#1F2937;--g900:#111827;
  --red:#EF4444;--green:#10B981;--yellow:#F59E0B;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--g900);background:#fff;line-height:1.5}
#root{min-height:100vh}

/* ── overlay ── */
#overlay{position:fixed;inset:0;z-index:100;pointer-events:none}
#overlay.active{pointer-events:all}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center}

/* ── nav ── */
.nav{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--g200);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-logo{font-weight:700;font-size:1.25rem;cursor:pointer;letter-spacing:-.5px;color:var(--g900);text-decoration:none}
.nav-logo span{color:var(--blue)}
.nav-links{display:flex;gap:.25rem;align-items:center}
.nav-link{padding:.4rem .75rem;border-radius:var(--radius);color:var(--g600);font-size:.9rem;cursor:pointer;border:none;background:none;transition:background .15s,color .15s}
.nav-link:hover{background:var(--g100);color:var(--g900)}
.nav-cta{padding:.4rem 1rem;border-radius:var(--radius);background:var(--blue);color:#fff;font-size:.9rem;font-weight:500;cursor:pointer;border:none;transition:background .15s}
.nav-cta:hover{background:var(--blue-dark)}

/* ── buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.6rem 1.25rem;border-radius:var(--radius);font-size:.95rem;font-weight:500;cursor:pointer;border:none;transition:all .15s;line-height:1.2}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-secondary{background:#fff;color:var(--g800);border:1px solid var(--g300)}
.btn-secondary:hover{background:var(--g50);border-color:var(--g400)}
.btn-ghost{background:none;color:var(--g500);font-size:.8rem}
.btn-ghost:hover{color:var(--g700);text-decoration:underline}
.btn-danger{background:var(--red);color:#fff}
.btn-lg{padding:.8rem 2rem;font-size:1.05rem}
.btn-sm{padding:.35rem .75rem;font-size:.8rem}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn[disabled]:hover{background:var(--blue)}

/* ── forms ── */
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1.25rem}
label{font-size:.875rem;font-weight:500;color:var(--g700)}
input[type=text],input[type=email],input[type=password],input[type=tel],select,textarea{
  width:100%;padding:.6rem .85rem;border:1px solid var(--g300);border-radius:var(--radius);
  font-size:.95rem;color:var(--g900);outline:none;transition:border-color .15s,box-shadow .15s
}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.field-note{font-size:.75rem;color:var(--g400)}
.field-error{font-size:.75rem;color:var(--red)}

/* ── hero ── */
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 1.5rem 5rem;gap:1.5rem;max-width:760px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .85rem;background:var(--blue-light);color:var(--blue);border-radius:999px;font-size:.8rem;font-weight:500;border:1px solid #BFDBFE}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.03em;line-height:1.1;color:var(--g900)}
.hero h1 em{color:var(--blue);font-style:normal}
.hero p{font-size:1.1rem;color:var(--g500);max-width:520px;line-height:1.6}
.hero-btns{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center}

/* ── features grid ── */
.section{padding:5rem 2rem;max-width:1100px;margin:0 auto}
.section-label{font-size:.8rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);margin-bottom:.75rem}
.section h2{font-size:clamp(1.5rem,3vw,2.25rem);font-weight:700;letter-spacing:-.03em;margin-bottom:1rem}
.section > p{color:var(--g500);font-size:1rem;max-width:500px;margin-bottom:2.5rem;line-height:1.6}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem}
.card{padding:1.5rem;border:1px solid var(--g200);border-radius:12px;background:#fff;box-shadow:var(--shadow)}
.card-icon{width:40px;height:40px;border-radius:10px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;margin-bottom:1rem;font-size:1.1rem}
.card h3{font-weight:600;margin-bottom:.4rem;font-size:1rem}
.card p{font-size:.875rem;color:var(--g500);line-height:1.5}
.card-link{font-size:.8rem;color:var(--blue);cursor:pointer;margin-top:.75rem;display:inline-block}
.card-link:hover{text-decoration:underline}

/* ── pricing ── */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1.5rem;margin-top:2rem}
.pricing-card{border:1px solid var(--g200);border-radius:12px;padding:2rem;position:relative;background:#fff}
.pricing-card.featured{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),var(--shadow-lg)}
.pricing-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:.75rem;font-weight:600;padding:.2rem .75rem;border-radius:999px;white-space:nowrap}
.pricing-tier{font-size:.85rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--g500);margin-bottom:.75rem}
.pricing-price{font-size:2.5rem;font-weight:800;letter-spacing:-.04em;line-height:1}
.pricing-price sup{font-size:1rem;font-weight:500;vertical-align:top;margin-top:.35rem;display:inline-block}
.pricing-caveat{font-size:.7rem;color:var(--g400);margin-top:.3rem;line-height:1.4}
.pricing-features{list-style:none;margin:1.5rem 0;display:flex;flex-direction:column;gap:.6rem}
.pricing-features li{font-size:.875rem;color:var(--g600);display:flex;align-items:center;gap:.5rem}
.pricing-features li::before{content:"✓";color:var(--green);font-weight:700;flex-shrink:0}
.pricing-features li.na{color:var(--g400)}
.pricing-features li.na::before{content:"–";color:var(--g300)}

/* ── modal ── */
.modal{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:min(480px,92vw);max-height:90vh;overflow-y:auto}
.modal-header{padding:1.5rem 1.5rem 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-body{padding:1.5rem}
.modal-footer{padding:0 1.5rem 1.5rem;display:flex;gap:.75rem;justify-content:flex-end}
.modal-title{font-size:1.15rem;font-weight:700}
.modal-close{cursor:pointer;color:var(--g400);font-size:1.25rem;background:none;border:none;padding:.2rem;line-height:1}
.modal-close:hover{color:var(--g900)}

/* ── cookie banner ── */
.cookie-box{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g200);box-shadow:0 -4px 20px rgba(0,0,0,.08);padding:1.25rem 2rem;z-index:200;display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
.cookie-text{flex:1;min-width:220px}
.cookie-text p{font-size:.875rem;color:var(--g600)}
.cookie-text a{color:var(--blue);cursor:pointer;font-size:.8rem;display:inline-block;margin-top:.25rem}
.cookie-actions{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.cookie-reject{font-size:.7rem;color:var(--g400);cursor:pointer;text-decoration:underline;white-space:nowrap}
.cookie-reject:hover{color:var(--g600)}

/* ── progress steps ── */
.steps{display:flex;align-items:center;gap:.25rem;margin-bottom:2rem}
.step{display:flex;align-items:center;gap:.25rem;font-size:.8rem;color:var(--g400)}
.step.active{color:var(--blue);font-weight:600}
.step.done{color:var(--green)}
.step-num{width:22px;height:22px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.step.done .step-num{background:var(--green);border-color:var(--green);color:#fff}
.step-sep{width:24px;height:2px;background:var(--g200);flex-shrink:0}
.step.done+.step-sep{background:var(--green)}
.progress-label{font-size:.75rem;color:var(--g400);margin-bottom:1.5rem;display:flex;justify-content:space-between}
.progress-bar-outer{height:4px;background:var(--g100);border-radius:4px;margin-bottom:2rem}
.progress-bar-inner{height:4px;background:var(--blue);border-radius:4px;transition:width .4s ease}

/* ── misc ── */
.divider{height:1px;background:var(--g200);margin:2rem 0}
.badge{display:inline-flex;align-items:center;padding:.2rem .65rem;border-radius:999px;font-size:.75rem;font-weight:500}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:#DCFCE7;color:#166534}
.badge-gray{background:var(--g100);color:var(--g600)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--g900);color:#fff;padding:.75rem 1.25rem;border-radius:var(--radius);font-size:.875rem;z-index:300;box-shadow:var(--shadow-lg);animation:slideup .2s ease}
@keyframes slideup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center;gap:1rem;color:var(--g400)}
.empty-state-icon{font-size:3rem}
.empty-state h3{font-size:1.1rem;font-weight:600;color:var(--g600)}
.empty-state p{font-size:.875rem;max-width:300px;line-height:1.5}
.alert{padding:.75rem 1rem;border-radius:var(--radius);font-size:.875rem;margin-bottom:1rem;display:flex;align-items:flex-start;gap:.5rem}
.alert-warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
.alert-info{background:var(--blue-light);border:1px solid #BFDBFE;color:#1E40AF}
.social-proof{position:fixed;bottom:1.5rem;left:1.5rem;background:#fff;border:1px solid var(--g200);border-radius:var(--radius);padding:.6rem 1rem;font-size:.8rem;color:var(--g600);box-shadow:var(--shadow);z-index:90;display:flex;align-items:center;gap:.5rem;max-width:260px;animation:slideup .2s ease}
.social-proof span{color:var(--g900);font-weight:500}
.footer{background:var(--g900);color:var(--g400);padding:3rem 2rem;font-size:.85rem}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;flex-wrap:wrap;gap:2rem;justify-content:space-between}
.footer-col h4{color:#fff;font-weight:600;margin-bottom:.75rem;font-size:.9rem}
.footer-col a{display:block;color:var(--g400);cursor:pointer;margin-bottom:.4rem;transition:color .15s}
.footer-col a:hover{color:var(--g200)}
.footer-bottom{max-width:1100px;margin:2rem auto 0;padding-top:1.5rem;border-top:1px solid var(--g800);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;font-size:.75rem}
.spinner{width:20px;height:20px;border:2px solid var(--g200);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.big-spinner{width:48px;height:48px;border-width:3px}
.loading-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.5rem;color:var(--g500)}
.loading-page p{font-size:.9rem}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:.75rem 0;border-bottom:1px solid var(--g100)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:.875rem;color:var(--g700)}
.toggle-label small{display:block;font-size:.75rem;color:var(--g400);margin-top:.15rem}
.toggle{width:36px;height:20px;border-radius:999px;background:var(--blue);position:relative;cursor:not-allowed;flex-shrink:0}
.toggle::after{content:'';position:absolute;right:2px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .15s}
.toggle.off{background:var(--g300)}
.toggle.off::after{transform:translateX(-16px)}
.lock-icon{font-size:.7rem;color:var(--g400);margin-left:.3rem}
.captcha-box{border:1px solid var(--g300);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;background:var(--g50)}
.captcha-check{width:20px;height:20px;border:2px solid var(--g300);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .1s}
.captcha-check.checking{animation:spin .6s linear infinite;border-top-color:var(--blue)}
.captcha-check.done{background:var(--green);border-color:var(--green);color:#fff;font-size:.8rem}
.captcha-label{font-size:.875rem;color:var(--g700);flex:1;margin:0 .75rem}
.captcha-logo{font-size:.65rem;color:var(--g400);text-align:center;line-height:1.3}
.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;cursor:pointer}
.image-cell{aspect-ratio:1;background:var(--g200);display:flex;align-items:center;justify-content:center;font-size:1.5rem;position:relative;border:2px solid transparent;transition:border-color .1s;user-select:none}
.image-cell.selected{border-color:var(--blue)}
.image-cell.selected::after{content:'✓';position:absolute;top:3px;right:3px;background:var(--blue);color:#fff;width:18px;height:18px;border-radius:50%;font-size:.65rem;display:flex;align-items:center;justify-content:center}
.verify-input{letter-spacing:.5em;font-size:1.5rem;text-align:center;font-weight:600}
.dashboard-layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 60px)}
.sidebar{border-right:1px solid var(--g200);padding:1rem;background:var(--g50)}
.sidebar-item{padding:.5rem .75rem;border-radius:var(--radius);font-size:.875rem;color:var(--g600);cursor:pointer;margin-bottom:.15rem}
.sidebar-item:hover{background:var(--g200);color:var(--g900)}
.sidebar-item.active{background:var(--blue-light);color:var(--blue);font-weight:500}
.dash-content{padding:2rem;overflow:auto}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.dash-header h1{font-size:1.4rem;font-weight:700}
.upgrade-banner{background:linear-gradient(135deg,var(--blue),#7C3AED);color:#fff;padding:1rem 1.25rem;border-radius:var(--radius);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;font-size:.875rem}
.upgrade-banner strong{font-size:1rem;display:block;margin-bottom:.15rem}
.upgrade-banner .btn{background:#fff;color:var(--blue);font-size:.8rem;padding:.35rem .85rem;white-space:nowrap}
.project-modal{background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);width:min(520px,94vw);max-height:90vh;overflow-y:auto}

/* ── narrator widget ── */
.chat-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:80;width:52px;height:52px;border-radius:50%;background:#2563eb;color:#fff;border:none;cursor:pointer;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:transform .15s,background .6s}
.chat-btn:hover{transform:scale(1.08)}
.chat-btn.narrator-awake{background:#1a1a1a}
.narrator-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:999px;font-size:.6rem;font-weight:700;min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;padding:0 4px;pointer-events:none}
.chat-panel{position:fixed;bottom:5.5rem;right:1.5rem;z-index:80;width:300px;height:400px;background:#fff;border-radius:16px;box-shadow:var(--shadow-lg);border:1px solid var(--g200);display:flex;flex-direction:column;overflow:hidden}
.chat-header{background:#1a1a1a;color:#e8e8e0;padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;transition:background .6s}
.chat-panel.chatbot .chat-header{background:#2563eb}
.chat-header .narrator-title{font-size:.8rem;font-weight:600;letter-spacing:.02em;transition:font-family .01s}
.chat-panel.chatbot .chat-header .narrator-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:700}
.chat-panel:not(.chatbot) .chat-header .narrator-title{font-family:Georgia,serif;letter-spacing:.04em}
.chat-header .narrator-sub{font-size:.62rem;opacity:.55;transition:font-family .01s}
.chat-panel.chatbot .chat-header .narrator-sub{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-style:normal}
.chat-panel:not(.chatbot) .chat-header .narrator-sub{font-family:Georgia,serif;font-style:italic;opacity:.45}
.chat-header button{background:none;border:none;color:#e8e8e0;cursor:pointer;opacity:.5;font-size:1rem;line-height:1}
.chat-messages{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.5rem;transition:background .6s}
.chat-panel.chatbot .chat-messages{background:#f0f4ff}
.chat-panel:not(.chatbot) .chat-messages{background:#fafaf8}
.chat-msg{max-width:92%;padding:.5rem .75rem;border-radius:10px;font-size:.78rem;line-height:1.55}
.chat-msg.bot{color:#2a2a2a;align-self:flex-start;border-bottom-left-radius:3px;transition:background .6s,font-family .01s,border-color .6s}
.chat-panel.chatbot .chat-msg.bot{background:#fff;border:1px solid #c7d7f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.chat-panel:not(.chatbot) .chat-msg.bot{background:#fff;border:1px solid #e8e8e4;font-family:Georgia,serif}
.chat-msg.narrator-pred{background:#fffff0;color:#555540;font-style:italic;border-color:#deded0}
.chat-msg.user{background:var(--blue);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.chat-typing{align-self:flex-start;padding:.45rem .7rem;background:var(--g100);border-radius:12px;border-bottom-left-radius:3px}
.chat-typing span{display:inline-block;width:5px;height:5px;background:var(--g400);border-radius:50%;animation:bounce .9s infinite;margin:0 1px}
.chat-typing span:nth-child(2){animation-delay:.15s}
.chat-typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(30,110,30,.5)}70%{box-shadow:0 0 0 18px rgba(30,110,30,0)}}
@keyframes ring-pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(160,30,30,.5)}70%{box-shadow:0 0 0 18px rgba(160,30,30,0)}}
.chat-input-row{padding:.5rem;border-top:1px solid var(--g200);display:flex;gap:.4rem}
.chat-input-row input{flex:1;padding:.4rem .65rem;border:1px solid var(--g300);border-radius:999px;font-size:.78rem;outline:none}
.chat-input-row button{padding:.4rem .85rem;border-radius:999px;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:.78rem}

/* ── tabs ── */
.tab-nav{display:flex;border-bottom:1px solid var(--g200);margin-bottom:1.5rem;gap:.1rem}
.tab-btn{padding:.55rem 1rem;font-size:.85rem;cursor:pointer;border:none;background:none;color:var(--g500);border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.tab-btn:hover:not(.active){color:var(--g800)}

/* ── onboarding checklist ── */
.cl-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem 0;border-bottom:1px solid var(--g100)}
.cl-item:last-child{border-bottom:none}
.cl-check{width:18px;height:18px;border-radius:50%;border:2px solid var(--g300);flex-shrink:0;margin-top:.1rem;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .2s;cursor:pointer}
.cl-check.done{background:var(--green);border-color:var(--green);color:#fff}
.cl-text{flex:1;font-size:.8rem;line-height:1.4;color:var(--g700)}
.cl-text small{color:var(--g400);display:block;font-size:.72rem}
.cl-action{font-size:.75rem;color:var(--blue);cursor:pointer;white-space:nowrap;flex-shrink:0}

/* ── billing ── */
.bill-row{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid var(--g100);font-size:.875rem}
.bill-row:last-child{border-bottom:none;padding-top:.75rem;font-weight:700;font-size:.95rem}
.bill-row .mystery{font-size:.7rem;color:var(--g400);cursor:help;margin-left:.25rem}

/* ── survey ── */
.survey-q{font-size:1rem;font-weight:600;margin-bottom:1.25rem;line-height:1.45}
.survey-opts{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.5rem}
.survey-opt{display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.875rem;padding:.3rem 0}
.star-row{display:flex;gap:.4rem;margin-bottom:1.5rem}
.star{font-size:1.8rem;cursor:pointer;opacity:.25;transition:opacity .1s;line-height:1}
.star.lit{opacity:1}
.nps-row{display:flex;gap:.25rem;flex-wrap:wrap;margin-bottom:.5rem}
.nps-btn{width:38px;height:38px;border-radius:var(--radius);border:1px solid var(--g300);background:#fff;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .12s}
.nps-btn:hover,.nps-btn.sel{background:var(--blue);color:#fff;border-color:var(--blue)}
.nps-labels{display:flex;justify-content:space-between;font-size:.7rem;color:var(--g400);margin-bottom:1.5rem}

/* ── delete account steps ── */
.danger-zone{border:1px solid #FCA5A5;border-radius:12px;padding:1.5rem;background:#FFF5F5;margin-top:2rem}
.danger-zone h3{color:var(--red);font-size:1rem;font-weight:700;margin-bottom:.5rem}

/* ══════════════════════════════════════
   PATH 1 — GAMESHOW
   ══════════════════════════════════════ */
.gs-bg{min-height:100vh;background:radial-gradient(ellipse at 30% 0%,#1a3a6e 0%,#050a1a 55%);overflow:hidden;position:relative}
.gs-stage{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1rem 3rem}
.gs-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:640px;margin-bottom:1.5rem}
.gs-logo{font-size:1.35rem;font-weight:900;letter-spacing:.18em;color:#F0B429;text-transform:uppercase;font-family:'Arial Black',Impact,sans-serif}
.gs-live{display:flex;align-items:center;gap:.4rem;font-size:.7rem;color:#fff;background:rgba(220,0,0,.85);padding:.2rem .75rem;border-radius:999px;font-weight:700;letter-spacing:.08em}
.gs-live::before{content:'';width:7px;height:7px;background:#fff;border-radius:50%;animation:gs-pulse 1s step-end infinite}
@keyframes gs-pulse{0%,100%{opacity:1}50%{opacity:0}}
.gs-contestant{font-size:.8rem;color:#F0B429;font-weight:700;letter-spacing:.04em;text-align:center;margin-bottom:.75rem;font-family:'Arial Black',sans-serif}
.gs-badge{background:#F0B429;color:#050a1a;padding:.3rem 1.1rem;border-radius:999px;font-size:.7rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.85rem;font-family:'Arial Black',sans-serif}
.gs-catchphrase{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;color:#fff;text-align:center;font-family:'Arial Black',Impact,sans-serif;letter-spacing:-.01em;margin-bottom:1.5rem;line-height:1.1;text-shadow:0 0 50px rgba(240,180,41,.35)}
.gs-card{background:rgba(255,255,255,.06);border:1px solid rgba(240,180,41,.25);border-radius:14px;padding:1.75rem;width:100%;max-width:540px}
.gs-card label{color:rgba(255,255,255,.75);font-size:.82rem}
.gs-card input,.gs-card select,.gs-card textarea{background:rgba(0,0,0,.35);border-color:rgba(255,255,255,.15);color:#fff;border-radius:6px}
.gs-card input::placeholder{color:rgba(255,255,255,.25)}
.gs-card .field-note{color:rgba(255,255,255,.35)}
.gs-card a{color:#F0B429}
.gs-card .form-group{margin-bottom:1rem}
.gs-prog-label{font-size:.68rem;color:rgba(255,255,255,.35);display:flex;justify-content:space-between;margin-bottom:.3rem}
.gs-prog-bar{height:3px;background:rgba(255,255,255,.08);border-radius:3px;margin-bottom:1.5rem}
.gs-prog-inner{height:3px;background:#F0B429;border-radius:3px;transition:width .5s ease;box-shadow:0 0 8px rgba(240,180,41,.5)}
.gs-btn{width:100%;margin-top:1rem;padding:.85rem;background:#F0B429;color:#050a1a;border:none;border-radius:8px;font-size:.95rem;font-weight:900;cursor:pointer;font-family:'Arial Black',sans-serif;letter-spacing:.05em;text-transform:uppercase;transition:transform .1s,box-shadow .15s;box-shadow:0 4px 20px rgba(240,180,41,.35)}
.gs-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(240,180,41,.5)}
.gs-bottom-ticker{position:fixed;bottom:0;left:0;right:0;background:rgba(3,6,15,.95);border-top:1px solid rgba(240,180,41,.15);padding:.3rem 0;font-size:.7rem;color:rgba(240,180,41,.6);white-space:nowrap;overflow:hidden}
.gs-ticker-inner{display:inline-block;animation:gs-scroll 35s linear infinite;padding-left:100%}
@keyframes gs-scroll{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.confetti{position:fixed;border-radius:2px;pointer-events:none;z-index:9999;animation:confetti-fall linear forwards}
@keyframes confetti-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(800deg);opacity:0}}

/* ══════════════════════════════════════
   PATH 2 — DESIGN HISTORY
   ══════════════════════════════════════ */
.geo-blink{animation:geo-blink 1s step-end infinite}
@keyframes geo-blink{0%,100%{opacity:1}50%{opacity:0}}
.xp-btn{background:#ECE9D8;border:2px outset #c0c0c0;padding:3px 14px;font-size:.75rem;cursor:pointer;font-family:Tahoma,Arial,sans-serif;min-width:70px}
.xp-btn:active{border-style:inset}
.flash-skip{font-size:.7rem;color:rgba(100,180,255,.5);cursor:pointer;letter-spacing:.1em;transition:color .2s}
.flash-skip:hover{color:rgba(100,180,255,.8)}
.brut-input{border:2px solid #000;border-radius:0;padding:.5rem .6rem;font-size:.95rem;width:100%;font-family:Helvetica,Arial,sans-serif;outline:none;background:#fff}
.brut-input:focus{outline:3px solid #000;outline-offset:0}
.brut-btn{background:#000;color:#fff;border:none;padding:.75rem 1.5rem;font-size:.9rem;font-weight:900;font-family:Helvetica,Arial,sans-serif;cursor:pointer;width:100%;text-transform:uppercase;letter-spacing:.08em}

/* ══════════════════════════════════════
   PATH 4 — TERMINAL / HACK
   ══════════════════════════════════════ */
.terminal{background:#0d1117;min-height:100vh;font-family:'Courier New',Courier,monospace;color:#00ff41;padding:1.5rem;overflow-y:auto;position:relative}
.t-titlebar{display:flex;align-items:center;gap:.5rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid rgba(0,255,65,.15)}
.t-dot{width:12px;height:12px;border-radius:50%}
.t-title{font-size:.75rem;color:rgba(0,255,65,.5);margin-left:.5rem;letter-spacing:.05em}
.t-line{line-height:1.65;font-size:.82rem;white-space:pre}
.t-dim{color:rgba(0,255,65,.4)}
.t-warn{color:#ff4444}
.t-hi{color:#fff;font-weight:700}
.t-gold{color:#F0B429}
.t-cursor{display:inline-block;width:7px;height:.85em;background:#00ff41;animation:t-blink .75s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes t-blink{0%,100%{opacity:1}50%{opacity:0}}
.t-ransom{background:#130000;border:2px solid #ff0000;border-radius:6px;padding:1.5rem;margin:1.5rem 0;text-align:center}
.t-ransom h2{color:#ff3333;font-size:1.1rem;margin-bottom:.75rem;letter-spacing:.05em}
.t-btn-red{background:#cc0000;color:#fff;border:1px solid #ff4444;padding:.6rem 1.5rem;font-family:'Courier New',monospace;font-size:.82rem;font-weight:700;cursor:pointer;border-radius:3px;margin:.3rem;letter-spacing:.05em}
.t-btn-red:hover{background:#ff0000}
.t-btn-dim{background:none;color:rgba(0,255,65,.35);border:1px solid rgba(0,255,65,.15);padding:.6rem 1.5rem;font-family:'Courier New',monospace;font-size:.82rem;cursor:pointer;border-radius:3px;margin:.3rem}
.t-btn-dim:hover{color:rgba(0,255,65,.7);border-color:rgba(0,255,65,.3)}
.t-reveal{background:#001500;border:1px solid rgba(0,255,65,.2);border-radius:6px;padding:1.5rem;margin:1.5rem 0}
.scanline{position:fixed;top:0;left:0;right:0;height:2px;background:rgba(0,255,65,.1);animation:scanline 4s linear infinite;pointer-events:none;z-index:5}
@keyframes scanline{from{top:0}to{top:100vh}}

/* ══════════════════════════════════════
   PATH 5 — DARK DELETE SCENE
   ══════════════════════════════════════ */
.del-scene{background:#0a0a0a;min-height:100vh;color:#c8c8c8;font-family:Georgia,'Times New Roman',serif}
.del-scene-inner{max-width:480px;margin:0 auto;padding:5rem 2rem 3rem}
.del-scene h1{font-size:1.6rem;font-weight:400;color:#e0e0e0;margin-bottom:2rem;line-height:1.35;letter-spacing:-.01em}
.del-scene p{font-size:.9rem;line-height:1.85;color:#888;margin-bottom:1.1rem}
.del-scene strong{color:#bbb;font-weight:600}
.del-scene input,.del-scene select,.del-scene textarea{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#e0e0e0;border-radius:3px;font-family:Georgia,serif}
.del-scene input:focus,.del-scene textarea:focus{border-color:rgba(255,255,255,.2);box-shadow:none;background:rgba(255,255,255,.06)}
.del-scene label{color:rgba(255,255,255,.4);font-family:Georgia,serif;font-size:.82rem}
.del-progress{height:1px;background:rgba(255,255,255,.06);margin-bottom:3.5rem;width:100%}
.del-progress-inner{height:1px;background:rgba(255,255,255,.2);transition:width .8s ease}
.del-step-label{font-size:.68rem;color:rgba(255,255,255,.18);letter-spacing:.12em;text-transform:uppercase;margin-bottom:.75rem;font-family:-apple-system,sans-serif}
.del-primary-btn{background:transparent;border:1px solid rgba(255,255,255,.15);color:#c0c0c0;padding:.65rem 1.5rem;font-size:.875rem;font-family:Georgia,serif;cursor:pointer;border-radius:3px;transition:border-color .2s,color .2s;letter-spacing:.01em}
.del-primary-btn:hover{border-color:rgba(255,255,255,.3);color:#e0e0e0}
.del-danger-btn{background:rgba(120,0,0,.3);border:1px solid rgba(180,40,40,.3);color:#d08080;padding:.65rem 1.5rem;font-size:.875rem;font-family:Georgia,serif;cursor:pointer;border-radius:3px;transition:all .2s}
.del-danger-btn:hover{background:rgba(150,0,0,.4);color:#e8a0a0}
.del-cancel-btn{background:none;border:none;color:rgba(255,255,255,.15);font-size:.78rem;font-family:Georgia,serif;cursor:pointer;padding:.4rem .6rem;transition:color .2s}
.del-cancel-btn:hover{color:rgba(255,255,255,.35)}
.del-jordan{display:flex;align-items:center;gap:1rem;padding:1rem;border:1px solid rgba(255,255,255,.06);border-radius:6px;margin-bottom:1.5rem;background:rgba(255,255,255,.02)}
.del-warning{border-left:2px solid rgba(180,60,60,.4);padding:.6rem 1rem;font-size:.82rem;color:#806060;margin-bottom:1.25rem;line-height:1.65;font-family:Georgia,serif}
.del-offer-box{text-align:center;padding:2.5rem 1.5rem;border:1px solid rgba(255,255,255,.06);border-radius:8px;margin-bottom:1.5rem}
.del-offer-price{font-size:3rem;font-weight:400;color:#d0d0d0;line-height:1;margin:.5rem 0}
.del-offer-sub{font-size:.78rem;color:#555;margin-top:.4rem;line-height:1.6}
.del-scene-done{background:#050505;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}
.del-scene-done-inner{max-width:380px;text-align:center;padding:2rem;color:#555}
.del-scene-done h2{font-size:1.25rem;font-weight:400;color:#888;margin-bottom:1.5rem}
.del-scene-done p{font-size:.85rem;line-height:1.8;margin-bottom:.75rem}

/* ══════════════════════════════════════
   PATH 6 — SURVEY DEGRADATION
   ══════════════════════════════════════ */
.sv-s2{background:#FFF8F0;min-height:100vh;font-family:Georgia,serif}
.sv-s2 .survey-q{font-family:Georgia,serif}
.sv-s2 .btn-primary{background:#8B5E3C;border-radius:3px;font-family:Georgia,serif}
.sv-s2 .btn-secondary{border-radius:3px;font-family:Georgia,serif}
.sv-s3{background:#111;min-height:100vh;color:#ccc;font-family:'Courier New',monospace}
.sv-s3 .survey-q{color:#fff;font-family:'Courier New',monospace;font-size:.95rem}
.sv-s3 .survey-opt{color:#bbb;font-family:'Courier New',monospace;font-size:.82rem}
.sv-s3 .btn-primary{background:#ddd;color:#111;font-family:'Courier New',monospace;border-radius:0;font-size:.82rem}
.sv-s3 .btn-secondary{background:none;border-color:#333;color:#666;font-family:'Courier New',monospace;border-radius:0;font-size:.82rem}
.sv-s3 input[type=radio]{accent-color:#ddd}
.sv-s4{background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;color:#fff}
.sv-s5{background:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;color:#111}

/* ── depth indicator ── */
.depth-pill{position:fixed;top:68px;right:1rem;background:rgba(0,0,0,.07);border-radius:999px;padding:.18rem .65rem;font-size:.68rem;color:var(--g500);z-index:40;pointer-events:none}

/* ── escalation glitch ── */
@keyframes glitch{0%,100%{transform:translate(0)}20%{transform:translate(-2px,1px)}40%{transform:translate(2px,-1px)}60%{transform:translate(-1px,2px)}80%{transform:translate(1px,-2px)}}
.glitch{animation:glitch .18s infinite}
@keyframes flicker{0%,100%{opacity:1}45%{opacity:.6}50%{opacity:1}55%{opacity:.5}60%{opacity:1}}
.flicker{animation:flicker 3s infinite}

/* ── help center ── */
.help-result{padding:.85rem 1rem;border:1px solid var(--g200);border-radius:var(--radius);cursor:pointer;margin-bottom:.5rem;transition:border-color .15s}
.help-result:hover{border-color:var(--blue)}
.help-result h4{font-size:.9rem;font-weight:500;margin-bottom:.2rem}
.help-result p{font-size:.78rem;color:var(--g500)}

/* ── mobile banner ── */
.mobile-banner{background:var(--g900);color:#fff;padding:.65rem 1.5rem;font-size:.8rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.mobile-banner a{color:#93C5FD;cursor:pointer;text-decoration:underline}
.mobile-banner button{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;padding:.2rem .65rem;border-radius:4px;cursor:pointer;font-size:.75rem}

/* ── support ticket ── */
.ticket-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.2rem .7rem;border-radius:999px;font-size:.72rem;font-weight:600}
.ticket-open{background:#DCFCE7;color:#166534}
.ticket-closed{background:var(--g100);color:var(--g500)}

/* ── adventure game ── */
.adv-wrap{background:#12082a;color:#c8bef0;min-height:100vh;font-family:'Georgia',serif}
.adv-shell{max-width:640px;margin:0 auto;padding:1.5rem 1rem}
.adv-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
.adv-title{font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#8877cc}
.adv-box{border:2px solid #3a2a6e;border-radius:4px;overflow:hidden}
.adv-art{height:200px;position:relative;overflow:hidden;background:#080410}
.adv-text{padding:1rem 1.25rem;font-size:.9rem;line-height:1.75;color:#b0a8d8;min-height:80px;border-top:1px solid #1a1232}
.adv-actions{padding:.5rem 1.25rem 1rem;display:flex;flex-wrap:wrap;gap:.5rem;border-top:1px solid #1a1232}
.adv-btn{background:#1e1240;color:#8877cc;border:1px solid #3a2a6e;padding:.4rem .9rem;font-size:.8rem;cursor:pointer;border-radius:3px;font-family:inherit;transition:all .15s}
.adv-btn:hover{background:#2e1e5e;color:#c0b0f0;border-color:#5540aa}
.adv-btn.adv-primary{background:#3a2a6e;color:#e0d8ff;border-color:#6644cc}
.adv-btn.adv-primary:hover{background:#4a3a8e}
.adv-inv{padding:.75rem 1.25rem;border-top:2px solid #3a2a6e;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;min-height:50px;background:#0d0820}
.adv-inv-label{font-size:.65rem;color:#4a3a7a;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.adv-item{background:#1e1240;border:1px solid #3a2a6e;padding:.3rem .7rem;font-size:.75rem;color:#a090d8;border-radius:3px}
.adv-room-name{font-size:.6rem;color:#2e2050;text-align:right;padding:.3rem .75rem;border-top:1px solid #160d35;font-family:monospace}

/* ══════════════════════════════════════
   MOBILE RESPONSIVE
   ══════════════════════════════════════ */
@media(max-width:640px){
  /* nav */
  .nav{padding:0 1rem;height:54px}
  .nav-links{gap:.15rem}
  .nav-link{display:none}
  .nav-cta{padding:.35rem .75rem;font-size:.8rem}

  /* hero */
  .hero{padding:3rem 1.25rem 2.5rem;gap:1.25rem}
  .hero p{font-size:.95rem}
  .hero-btns{flex-direction:column;align-items:stretch}
  .hero-btns .btn{width:100%;justify-content:center}

  /* sections */
  .section{padding:2.5rem 1.25rem}
  .grid-3{grid-template-columns:1fr}
  .pricing-grid{grid-template-columns:1fr}

  /* dashboard — stack sidebar above content */
  .dashboard-layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{border-right:none;border-bottom:1px solid var(--g200);padding:.5rem .75rem;display:flex!important;flex-direction:row!important;overflow-x:auto;gap:.25rem;background:var(--g50)}
  .sidebar-item{white-space:nowrap;flex-shrink:0;padding:.4rem .65rem;font-size:.78rem;margin-bottom:0}
  .sidebar [style*="margin-top:auto"]{display:none!important}
  .dash-content{padding:1rem}
  .dash-header{flex-direction:column;align-items:flex-start;gap:.6rem}

  /* upgrade banner */
  .upgrade-banner{flex-direction:column;align-items:flex-start;gap:.5rem}

  /* dash nav */
  .nav-links span{display:none}

  /* chat panel */
  .chat-panel{width:calc(100vw - 2rem);right:1rem;bottom:4.5rem;height:260px}
  .chat-header{cursor:grab}
  .chat-header:active{cursor:grabbing}

  /* social proof — hide on mobile to avoid overlap */
  .social-proof{display:none}

  /* toast */
  .toast{left:1rem;right:1rem;bottom:1rem;text-align:center}

  /* cookie banner */
  .cookie-box{padding:1rem 1.25rem;gap:.75rem}
  .cookie-actions{width:100%;justify-content:flex-end}

  /* modal */
  .modal,.project-modal{border-radius:12px}

  /* steps — scrollable on narrow screens */
  .steps{overflow-x:auto;padding-bottom:.25rem}

  /* terminal */
  .terminal{padding:1rem;font-size:.75rem}
  .t-line{font-size:.75rem;white-space:pre-wrap;word-break:break-word}

  /* delete scene */
  .del-scene-inner{padding:3rem 1.25rem 2rem}

  /* survey / misc */
  .nps-row{gap:.2rem}
  .nps-btn{width:32px;height:32px;font-size:.72rem}

  /* footer */
  .footer{padding:2rem 1.25rem}
  .footer-inner{flex-direction:column;gap:1.25rem}
  .footer-bottom{flex-direction:column;align-items:flex-start;gap:.5rem}

  /* depth pill */
  .depth-pill{top:58px}

  /* gameshow path */
  .gs-stage{padding:1rem .75rem 2.5rem}
  .gs-catchphrase{font-size:clamp(1.2rem,5vw,1.8rem)}
}
/* ── backrooms ── */
body.br-mode{background:#e8d5a3}
body.br-deep{background:#0d0a06}
@keyframes br-flicker{0%,94%,96%,100%{filter:brightness(1)}95%{filter:brightness(.85)}}
@keyframes br-deep-flicker{0%,88%,91%,95%,100%{filter:brightness(1)}89%{filter:brightness(.6)}94%{filter:brightness(.85)}}
body.br-fc-1 .nav-links{font-family:'Courier New',monospace}
body.br-fc-2 .nav-links,.br-fc-2 .btn{font-family:'Courier New',monospace}
body.br-fc-3 .nav-links,.br-fc-3 .btn,.br-fc-3 h1,.br-fc-3 .hero-h1{font-family:'Courier New',monospace}
</style>
